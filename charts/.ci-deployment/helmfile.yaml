# CI-only stub for Trivy chart scanning.

repositories:
  - name: jetstack # cert-manager
    url: https://charts.jetstack.io
  - name: traefik
    url: https://traefik.github.io/charts
  - name: topolvm
    url: https://topolvm.github.io/topolvm
---
environments:
  default:
    values:
      - topolvmStorageClassName: "topolvm"
---
releases:
  - name: security-hardening
    chart: ./security-hardening
    namespace: kube-system
    values:
      - security-hardening/values.yaml

  - name: cert-manager
    chart: ./cert-manager
    namespace: cert-manager
    values:
      - cert-manager/values.common.yaml.gotmpl
      - cert-manager/values.selfsigned.yaml.gotmpl

  - name: traefik
    chart: ./traefik
    namespace: traefik
    needs:
      - cert-manager/cert-manager
    values:
      - traefik/values.common.yaml.gotmpl

  - name: topolvm
    chart: ./topolvm
    namespace: topolvm-system
    values:
      - topolvm/values.yaml.gotmpl
