misconfigurations:
  - id: AVD-KSV-0038
    paths:
      - "security-hardening/templates/calico-apiserver-networkpolicy.yaml"
    statement: >
      This policy is not using any selectors as we do not control installation
      of calico-apiserver (done via Kubespray). To avoid labels mismatch on
      Kubespray updates, we apply this network policy to all applications
      in calico api server namespace

  #
  # cert-manager
  #
  - id: AVD-KSV-0041
    paths:
      - "cert-manager/charts/cert-manager/templates/rbac.yaml"
      - "cert-manager/charts/cert-manager/templates/cainjector-rbac.yaml"
    statement: >
      cert-manager must manage Secrets to store issued certificates and CA
      private keys. These permissions are defined by the upstream chart and
      cannot be narrowed without breaking certificate issuance.

  - id: AVD-KSV-0113
    paths:
      - "cert-manager/charts/cert-manager/templates/webhook-rbac.yaml"
    statement: >
      The cert-manager webhook manages its own dynamic serving-certificate
      Secret within its namespace. Required by the upstream chart.

  - id: AVD-KSV-0114
    paths:
      - "cert-manager/charts/cert-manager/templates/cainjector-rbac.yaml"
    statement: >
      The cainjector must create/update mutating and validating webhook
      configurations to inject CA bundles. This is its core function.

  - id: AVD-KSV-0048
    paths:
      - "cert-manager/charts/cert-manager/templates/rbac.yaml"
    statement: >
      The ACME challenge controller creates solver Pods/Jobs for HTTP01
      challenges. Granted by the upstream ClusterRole regardless of the solver
      type actually used.

  - id: AVD-KSV-0056
    paths:
      - "cert-manager/charts/cert-manager/templates/rbac.yaml"
    statement: >
      The ACME challenge controller manages Services/Ingresses/NetworkPolicies
      for HTTP01 solvers. Granted by the upstream ClusterRole and cannot be
      narrowed.

  - id: AVD-KSV-0038
    paths:
      - "cert-manager/templates/networkpolicy.yaml"
    statement: >
      Ingress must allow the Kubernetes API server (webhook calls), which is not
      a selectable Pod. We therefore scope the source by CIDR (nets) instead of
      pod/namespace selectors.

  #
  # traefik
  #
  - id: AVD-KSV-0038
    paths:
      - "traefik/templates/networkpolicy.yaml"
    statement: >
      Traefik is an entry point for external traffic. It must accept it from outside
      and send to anything inside the cluster.

  - id: KSV-0024
    paths:
      - "traefik/charts/traefik/templates/daemonset.yaml"
    statement: >
      Traefik listens on hostPorts of the nodes. This is done for simplicity.

  - id: KSV-0041
    paths:
      - "traefik/charts/traefik/templates/rbac/clusterrole.yaml"
    statement: >
      Traefik needs to manages see secrets to manage middlewares or other resources.

  #
  # aws-ebs-csi-driver
  #

  - id: AVD-KSV-0001
    paths:
      - "aws-ebs-csi-driver/charts/aws-ebs-csi-driver/templates/node.yaml"
    statement: >
      The ebs-plugin node container runs as privileged (required to attach EBS
      block devices and perform mount/format operations on the host). The
      Kubernetes API server rejects the combination `privileged: true` with
      `allowPrivilegeEscalation: false`, so this control cannot be enforced
      for this container.

  - id: AVD-KSV-0012
    paths:
      - "aws-ebs-csi-driver/charts/aws-ebs-csi-driver/templates/node.yaml"
    statement: >
      The CSI node containers (ebs-plugin, liveness-probe, node-driver-registrar)
      must run as root to bind the CSI unix socket in the kubelet plugin
      directory and to mount block devices on the host.

  - id: AVD-KSV-0017
    paths:
      - "aws-ebs-csi-driver/charts/aws-ebs-csi-driver/templates/node.yaml"
    statement: >
      The ebs-plugin node container must be privileged to attach EBS block
      devices and to perform mount/format operations on the host.

  - id: AVD-KSV-0023
    paths:
      - "aws-ebs-csi-driver/charts/aws-ebs-csi-driver/templates/node.yaml"
    statement: >
      The CSI node DaemonSet must mount kubelet directories as hostPath volumes
      so the kubelet can discover the driver and use volumes it publishes.

  - id: AVD-KSV-0121
    paths:
      - "aws-ebs-csi-driver/charts/aws-ebs-csi-driver/templates/node.yaml"
    statement: >
      /dev must be mounted from the host so the driver can attach EBS volumes
      as block devices to the node.

  - id: AVD-KSV-0038
    paths:
      - "aws-ebs-csi-driver/templates/networkpolicy.yaml"
    statement: >
      This is a Calico NetworkPolicy (projectcalico.org/v3) which uses `selector`
      instead of the native `podSelector` field. Trivy only understands the
      Kubernetes-native NetworkPolicy schema and reports a false positive.

  #
  # topolvm
  #
  - id: AVD-KSV-0038
    paths:
      - "topolvm/templates/networkpolicy.yaml"
    statement: >
      Ingress must allow the Kubernetes API server (webhook calls) and egress
      must reach it back. kube-apiserver is a static pod with hostNetwork: true
      and is not a selectable workload in Calico, so we scope by CIDR (nets)
      instead of pod/namespace selectors.

  - id: AVD-KSV-0001
    paths:
      - "topolvm/charts/topolvm/templates/node/daemonset.yaml"
      - "topolvm/charts/topolvm/templates/lvmd/daemonset.yaml"
    statement: >
      The topolvm-node and lvmd containers must run with `privileged: true` to
      access block devices, perform LVM ioctls, and mount volumes on the host;
      privileged implies `allowPrivilegeEscalation`. The csi-registrar and
      liveness-probe sidecars in the node DaemonSet have no securityContext
      block exposed by the upstream chart, so this control cannot be enforced
      via values.

  - id: AVD-KSV-0010
    paths:
      - "topolvm/charts/topolvm/templates/lvmd/daemonset.yaml"
    statement: >
      The lvmd DaemonSet sets `hostPID: true` in the upstream chart to interact
      with LVM subsystems on the host. This is hardcoded in the template and
      cannot be disabled without patching upstream.

  - id: AVD-KSV-0012
    paths:
      - "topolvm/charts/topolvm/templates/node/daemonset.yaml"
      - "topolvm/charts/topolvm/templates/lvmd/daemonset.yaml"
    statement: >
      The topolvm-node and lvmd containers must run as root to perform LVM
      ioctls and manage block devices via CSI. The csi-registrar and
      liveness-probe sidecars in the node DaemonSet have no container-level
      securityContext exposed by the upstream chart, so `runAsNonRoot` cannot
      be enforced there either.

  - id: AVD-KSV-0014
    paths:
      - "topolvm/charts/topolvm/templates/node/daemonset.yaml"
      - "topolvm/charts/topolvm/templates/lvmd/daemonset.yaml"
      - "topolvm/charts/topolvm/templates/controller/deployment.yaml"
    statement: >
      The upstream chart hardcodes the container-level securityContext for the
      controller containers (topolvm-controller and the CSI sidecars) and does
      not expose it at all for the node CSI sidecars, so `readOnlyRootFilesystem`
      cannot be set from values. For the privileged topolvm-node and lvmd
      containers we keep the writable root filesystem for parity with the
      upstream defaults and their runtime write needs (LVM tooling, socket
      creation).

  - id: AVD-KSV-0017
    paths:
      - "topolvm/charts/topolvm/templates/node/daemonset.yaml"
      - "topolvm/charts/topolvm/templates/lvmd/daemonset.yaml"
    statement: >
      The topolvm-node and lvmd containers require `privileged: true` to
      attach/detach block devices, perform LVM operations, and mount volumes on
      the host. This is inherent to how the CSI driver operates on the node.

  - id: AVD-KSV-0023
    paths:
      - "topolvm/charts/topolvm/templates/node/daemonset.yaml"
      - "topolvm/charts/topolvm/templates/lvmd/daemonset.yaml"
    statement: >
      The CSI node driver must mount kubelet plugin directories, the pod
      volumes directory, and `/dev` (and `/run/topolvm` for lvmd) as hostPath
      volumes so that the kubelet can discover the driver and so that volumes
      published by the driver are visible on the host.

  - id: AVD-KSV-0048
    paths:
      - "topolvm/charts/topolvm/templates/controller/clusterroles.yaml"
    statement: >
      The topolvm-controller needs write access to workload resources (pods,
      deployments, statefulsets, etc.) because CSI storage-capacity tracking
      and PVC controller logic set owner references and update finalizers on
      those objects. Granted by the upstream ClusterRole.

  - id: AVD-KSV-0049
    paths:
      - "topolvm/charts/topolvm/templates/controller/roles.yaml"
    statement: >
      The topolvm-controller uses the standard Kubernetes leader-election
      mechanism, which requires create/update/patch/delete on the coordination
      configmap in its own namespace. Granted by the upstream leader-election
      Role.

  - id: AVD-KSV-0118
    paths:
      - "topolvm/charts/topolvm/templates/lvmd/daemonset.yaml"
    statement: >
      The lvmd DaemonSet template in the upstream chart does not render a
      pod-level securityContext block, so a non-default pod securityContext
      cannot be set via values. The lvmd container itself runs privileged as
      required for LVM operations on the host.

  - id: AVD-KSV-0121
    paths:
      - "topolvm/charts/topolvm/templates/node/daemonset.yaml"
      - "topolvm/charts/topolvm/templates/lvmd/daemonset.yaml"
    statement: >
      Mounting `/dev` from the host is required so that the CSI driver and
      lvmd can attach EBS/local block devices and manage LVM logical volumes
      as block devices on the node.
