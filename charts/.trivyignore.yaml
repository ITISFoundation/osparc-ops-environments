misconfigurations:
  - id: AVD-KSV-0038
    paths:
      - "security-hardening/templates/calico-apiserver-networkpolicy.yaml"
    statement: >
      This policy is not using any selectors as we do not control installation
      of calico-apiserver (done via Kubespray). To avoid labels mismatch on
      Kubespray updates, we apply this network policy to all applications
      in calico api server namespace

  #
  # cert-manager
  #
  - id: AVD-KSV-0041
    paths:
      - "cert-manager/charts/cert-manager/templates/rbac.yaml"
      - "cert-manager/charts/cert-manager/templates/cainjector-rbac.yaml"
    statement: >
      cert-manager must manage Secrets to store issued certificates and CA
      private keys. These permissions are defined by the upstream chart and
      cannot be narrowed without breaking certificate issuance.

  - id: AVD-KSV-0113
    paths:
      - "cert-manager/charts/cert-manager/templates/webhook-rbac.yaml"
    statement: >
      The cert-manager webhook manages its own dynamic serving-certificate
      Secret within its namespace. Required by the upstream chart.

  - id: AVD-KSV-0114
    paths:
      - "cert-manager/charts/cert-manager/templates/cainjector-rbac.yaml"
    statement: >
      The cainjector must create/update mutating and validating webhook
      configurations to inject CA bundles. This is its core function.

  - id: AVD-KSV-0048
    paths:
      - "cert-manager/charts/cert-manager/templates/rbac.yaml"
    statement: >
      The ACME challenge controller creates solver Pods/Jobs for HTTP01
      challenges. Granted by the upstream ClusterRole regardless of the solver
      type actually used.

  - id: AVD-KSV-0056
    paths:
      - "cert-manager/charts/cert-manager/templates/rbac.yaml"
    statement: >
      The ACME challenge controller manages Services/Ingresses/NetworkPolicies
      for HTTP01 solvers. Granted by the upstream ClusterRole and cannot be
      narrowed.

  - id: AVD-KSV-0038
    paths:
      - "cert-manager/templates/networkpolicy.yaml"
    statement: >
      Ingress must allow the Kubernetes API server (webhook calls), which is not
      a selectable Pod. We therefore scope the source by CIDR (nets) instead of
      pod/namespace selectors.

  #
  # reflector
  #
  - id: AVD-KSV-0038
    paths:
      - "reflector/templates/networkpolicy.yaml"
    statement: >
      Egress must reach the Kubernetes API server, which runs as a hostNetwork
      static pod and is not a selectable Calico workload. We therefore scope the
      destination by CIDR (nets) instead of pod/namespace selectors.

  - id: AVD-KSV-0041
    paths:
      - "reflector/charts/reflector/templates/clusterRole.yaml"
    statement: >
      Reflector's core function is to mirror Secrets across namespaces, so it
      must manage Secrets cluster-wide. Defined by the upstream chart and cannot
      be narrowed without breaking reflection.

  - id: AVD-KSV-0045
    paths:
      - "reflector/charts/reflector/templates/clusterRole.yaml"
    statement: >
      The upstream reflector ClusterRole grants a wildcard verb on ConfigMaps
      and Secrets to watch, read and mirror them across namespaces. This is
      required by the upstream chart and cannot be narrowed.

  - id: AVD-KSV-0049
    paths:
      - "reflector/charts/reflector/templates/clusterRole.yaml"
    statement: >
      Reflector must create/update ConfigMaps in target namespaces to mirror
      them. Granted by the upstream chart and required for reflection.

  #
  # traefik
  #
  - id: AVD-KSV-0022
    paths:
      - "traefik/templates/daemonset.yaml"
    statement: >
      Traefik binds the privileged ports 80/443 directly, which requires the
      NET_BIND_SERVICE capability. All other capabilities are dropped and the
      container still runs as non-root.
      https://github.com/traefik/traefik-helm-chart/blob/master/EXAMPLES.md#bind-to-privileged-ports-80-and-443

  - id: AVD-KSV-0024
    paths:
      - "traefik/templates/daemonset.yaml"
    statement: >
      Traefik is the public ingress gateway and binds ports 80/443 on each node
      via hostPort (restricted to this known list). This is the intended
      hostPort ingress setup for bare-metal/self-managed clusters.

  - id: AVD-KSV-0117
    paths:
      - "traefik/templates/daemonset.yaml"
    statement: >
      The web/websecure entrypoints intentionally use privileged containerPorts
      80/443 so the ingress gateway serves the standard HTTP/HTTPS ports.

  - id: AVD-KSV-0038
    paths:
      - "traefik/templates/extra-objects.yaml"
    statement: >
      Traefik is the public ingress gateway: ingress must be allowed from
      anywhere, and egress is scoped by CIDR (nets) to internal/private networks
      (incl. the kube API server, a hostNetwork static pod that is not a
      selectable Calico workload).

  - id: AVD-KSV-0041
    paths:
      - "traefik/templates/rbac/clusterrole.yaml"
    statement: >
      Traefik must read Secrets (get/list/watch) to load the TLS certificates
      referenced by Ingresses/IngressRoutes. Defined by the upstream chart's
      ClusterRole and cannot be narrowed without breaking TLS.
