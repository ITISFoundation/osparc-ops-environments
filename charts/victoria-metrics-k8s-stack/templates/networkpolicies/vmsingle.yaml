apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: vmsingle-network-policy
spec:
  selector: app == "vmsingle" && part-of == "{{ .Release.Name }}"
  ingress:
    # writes from vmagent and reads from traefik (via ingress)
    - action: Allow
      protocol: TCP
      destination:
        ports:
          - {{ index .Values "vm-k8s-stack" "vmsingle" "spec" "port" }}
