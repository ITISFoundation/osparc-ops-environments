# CI-only stub for Trivy chart scanning.

repositories:
  - name: jetstack # cert-manager
    url: https://charts.jetstack.io
  - name: emberstack # reflector
    url: https://emberstack.github.io/helm-charts
  - name: traefik
    url: https://traefik.github.io/charts

releases:
  - name: security-hardening
    chart: ./security-hardening
    namespace: kube-system
    values:
      - security-hardening/values.yaml

  - name: reflector
    namespace: reflector
    chart: ./reflector
    values:
      - ./reflector/values.yaml.gotmpl

  - name: cert-manager
    chart: ./cert-manager
    namespace: cert-manager
    needs:
      - reflector/reflector
    values:
      - cert-manager/values.common.yaml.gotmpl
      - cert-manager/values.selfsigned.yaml.gotmpl

  - name: traefik
    chart: traefik/traefik
    version: 40.0.0
    namespace: traefik
    values:
      - traefik/values.common.yaml.gotmpl
