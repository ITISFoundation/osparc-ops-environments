services:
  local-mail-server:
    image:  axllent/mailpit:v1.29.6
    networks:
      - public
      - monitored
    environment:
      MP_MAX_MESSAGES: 5000
      MP_WEBROOT: ${HTTP_PROXY_PREFIX_PATH}
      MP_SMTP_AUTH: "${SMTP_USERNAME}:${SMTP_PASSWORD}"
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      MP_POP3_AUTH: "${SMTP_USERNAME}:${SMTP_PASSWORD}"
    deploy:
      replicas: 1
      update_config:
        order: stop-first
        failure_action: rollback
      placement:
        constraints:
          - node.labels.ops==true
      labels:
        - traefik.enable=true
        - traefik.swarm.network=${PUBLIC_NETWORK}
        # WEB GUI: router
        - traefik.http.routers.local-mail-server-gui.rule=Host(`${MONITORING_DOMAIN}`) && PathPrefix(`${HTTP_PROXY_PREFIX_PATH}`)
        - traefik.http.routers.local-mail-server-gui.entrypoints=https
        - traefik.http.routers.local-mail-server-gui.tls=true
        - traefik.http.routers.local-mail-server-gui.middlewares=ops_whitelist_ips@swarm, ops_gzip@swarm, ops_auth@swarm
        # WEB GUI: service
        - traefik.http.services.local-mail-server-gui.loadbalancer.server.port=8025
        - traefik.http.services.local-mail-server-gui.loadbalancer.healthcheck.path=${HTTP_PROXY_PREFIX_PATH}
        - traefik.http.services.local-mail-server-gui.loadbalancer.healthcheck.interval=10s
        - traefik.http.services.local-mail-server-gui.loadbalancer.healthcheck.timeout=2s
        # SMTP: router
        - traefik.tcp.routers.local-mail-server-smtp.rule=HostSNI(`${SMTP_HOST}`)
        - traefik.tcp.routers.local-mail-server-smtp.entrypoints=smtp
        - traefik.tcp.routers.local-mail-server-smtp.tls=true
        # SMTP: service
        - traefik.tcp.services.local-mail-server-smtp.loadbalancer.server.port=1025
        # POP3: router
        - traefik.tcp.routers.local-mail-server-pop3.rule=HostSNI(`${SMTP_HOST}`)
        - traefik.tcp.routers.local-mail-server-pop3.entrypoints=pop3
        - traefik.tcp.routers.local-mail-server-pop3.tls=true
        # POP3: service
        - traefik.tcp.services.local-mail-server-pop3.loadbalancer.server.port=1110
      resources:
          limits:
              memory: 512M
              cpus: "0.5"
          reservations:
              memory: 256M
              cpus: "0.1"
    # healthcheck configured in https://github.com/axllent/mailpit/blob/v1.29.6/Dockerfile#L28

networks:
  public:
    external: true
    name: ${PUBLIC_NETWORK}
  monitored:
    name: ${MONITORED_NETWORK}
    external: true
