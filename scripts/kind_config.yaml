# kind-config.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # web: traefik binds the node's :80 directly via hostPort
      - containerPort: 80
        hostPort: 80
      # websecure: traefik binds the node's :443 directly via hostPort
      - containerPort: 443
        hostPort: 443
      # webinternal port (NodePort entrypoint)
      # we use as is (no port remapping)
      # Not a common port (like http) that expects 80/443
      - containerPort: 32081
        hostPort: 32081
    labels:
      ops: "true"
      simcore: "true"

# https://archive-os-3-26.netlify.app/calico/3.26/getting-started/kubernetes/kind/
networking:
  disableDefaultCNI: true
  # must match with cidr in https://raw.githubusercontent.com/projectcalico/calico/v3.26.4/manifests/custom-resources.yaml
  podSubnet: 192.168.0.0/16
