# kind-config.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # web port
      - containerPort: 32080
        hostPort: 80
      # webinternal port
      # we use as is (no port remapping)
      # Not a common port (like http) that expects 80/443
      - containerPort: 32081
        hostPort: 32081
      # websecure port
      - containerPort: 32443
        hostPort: 443
      - containerPort: 32443
        hostPort: 8443  ## handle traefik [interal] http --> https redirect
    labels:
      ops: "true"
      simcore: "true"
    # kind runs the "node" as a Docker container with its own (volatile) journal,
    # so /var/log/journal does not exist inside it. Bind-mount the host's
    # persistent journal into the node at the same path the vector DaemonSet
    # already reads (node /var/log), so victoria-logs' journald source can scrape
    # real system logs locally. Read-only: we never want to mutate the host journal.
    extraMounts:
      - hostPath: /var/log/journal
        containerPath: /var/log/journal
        readOnly: true

# https://archive-os-3-26.netlify.app/calico/3.26/getting-started/kubernetes/kind/
networking:
  disableDefaultCNI: true
  # must match with cidr in https://raw.githubusercontent.com/projectcalico/calico/v3.26.4/manifests/custom-resources.yaml
  podSubnet: 192.168.0.0/16
